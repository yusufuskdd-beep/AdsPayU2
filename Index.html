<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//lib.gigapub.tech/tag.min.js'></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px;
            background: #1a1a1a;
            color: white;
        }
        #watchBtn {
            background: #2AABEE;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
        }
        #watchBtn:disabled {
            background: #555;
            cursor: not-allowed;
        }
        #balance { font-size: 24px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="balance">Balance: 0 Coins</div>
    <button id="watchBtn">Watch Ad +10 Coins</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Make app full screen
        tg.ready();
        
        let userId = tg.initDataUnsafe.user?.id;
        let balance = 0;

        // INIT GIGAPUB
        GigaPub.init({
            appId: '7204', 
            zoneId: 'main'
        });

        document.getElementById('watchBtn').onclick = () => {
            document.getElementById('watchBtn').disabled = true;
            document.getElementById('watchBtn').innerText = "Loading Ad...";

            GigaPub.showRewardedAd({
                onReward: () => {
                    balance += 10;
                    document.getElementById('balance').innerText = `Balance: ${balance} Coins`;
                    alert('✅ You earned 10 coins!');
                    document.getElementById('watchBtn').disabled = false;
                    document.getElementById('watchBtn').innerText = "Watch Ad +10 Coins";
                    
                    // NEXT STEP: Send to backend
                    // fetch(`/api/credit?user_id=${userId}&amount=10`)
                },
                onError: (err) => {
                    alert('❌ Ad failed to load. Try again in 30s.');
                    document.getElementById('watchBtn').disabled = false;
                    document.getElementById('watchBtn').innerText = "Watch Ad +10 Coins";
                },
                onClose: () => {
                    document.getElementById('watchBtn').disabled = false;
                    document.getElementById('watchBtn').innerText = "Watch Ad +10 Coins";
                }
            });
        };
    </script>
</body>
</html>
